<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Price Predictor</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fab fa-bitcoin"></i>
                <h1>Bitcoin Predictor</h1>
            </div>
            <p class="tagline">AI-Powered Price Movement Prediction</p>
        </header>

        <!-- Main Content -->
        <main class="grid">
            <!-- Prediction Form -->
            <section class="card prediction-card">
                <h2><i class="fas fa-brain"></i> Make Prediction</h2>
                
                <form id="predictionForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Open Price ($)</label>
                            <input type="number" id="open" name="open" step="0.01" placeholder="45000" required>
                        </div>
                        <div class="form-group">
                            <label>Close Price ($)</label>
                            <input type="number" id="close" name="close" step="0.01" placeholder="45500" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>High Price ($)</label>
                            <input type="number" id="high" name="high" step="0.01" placeholder="46000" required>
                        </div>
                        <div class="form-group">
                            <label>Low Price ($)</label>
                            <input type="number" id="low" name="low" step="0.01" placeholder="44000" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Month</label>
                        <select id="month" name="month">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn" id="predictBtn">
                        <i class="fas fa-crystal-ball"></i> Predict Price Movement
                    </button>
                </form>

                <!-- Prediction Result -->
                <div id="predictionResult" class="result hidden">
                    <div class="result-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="result-text" id="predictionText">--</div>
                    <div class="confidence">
                        Confidence: <span id="confidenceText">--%</span>
                    </div>
                    <div class="probabilities">
                        <div class="prob-item">
                            <i class="fas fa-arrow-up"></i> UP: <span id="upProb">--%</span>
                        </div>
                        <div class="prob-item">
                            <i class="fas fa-arrow-down"></i> DOWN: <span id="downProb">--%</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Loading Overlay -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Predicting...</p>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
